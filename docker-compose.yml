services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: full_food_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: file:../data/dev.db
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - app_data:/app/data

  redis:
    image: valkey/valkey:8-alpine
    container_name: full_food_redis
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  app_data:
  redis_data:
